<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codebattles</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="all">
        <div class="header">
            <div class="logo">kotbattles</div>
            <div class="nickname" id="name"></div>
        </div>

        <hr class="separator">

        <div class="problem">
            <div class="problem-header">
                <span>Problem</span>
            </div>
            <div class="problem-content" id="problemContent">
                text
            </div>
            <div class="answer">
                <input type="text" id="answerField" placeholder="Your answer">
                <button class="button" id="submitAnswerBtn">Check</button>
                <div class="answer-feedback" id="answerFeedback"></div>
            </div>
        </div>

        <hr class="separator">

        <div class="editors">
            <div class="panel">
                <div class="panel-header">
                    <span>You</span>
                    <button class="button" id="runBtn" >>> Run</button>
                </div>
                <textarea id="myEditor" class="code-editor" placeholder="Write your solution here..."></textarea>
            </div>
            <div class="panel">
                <div class="panel-header">
                    <span>Opponent</span>
                    <div id="roomStatus" class="room-status waiting">~ Waiting for opponent</div>
                </div>
                <textarea id="opponentEditor" class="code-editor" readonly placeholder="Opponent's code will appear here..."></textarea>
            </div>
        </div>

        <hr class="separator">

        <div class="problem">
            <div class="problem-header">Stdout</div>
            <pre id="stdoutArea" class="stdout-content">Your program output will appear here after clicking Run.</pre>
        </div>

    </div>

    <script src="/static/battle.js"></script>
</body>
</html>
