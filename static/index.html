<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codebattles</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="all">
        <div class="header">
            <div class="logo">kotbattles</div>
            <div class="nickname" id="name"></div>
        </div>

        <hr class="separator">


        <div class="room-input-group">
            <input type="text" id="roomName" placeholder="Enter room ID" autocomplete="off">
            <button id="joinBtn">Join / Create Battle</button>
        </div>

        <button id="showPlayersBtn">Show Online Players</button>
        <div id="playerListContainer" style="display: none;">
            <h3>Online Players</h3>
            <ul id="playerList"></ul>
        </div>

    </div>

    <script src="/static/lobby.js"></script>
</body>
</html>
